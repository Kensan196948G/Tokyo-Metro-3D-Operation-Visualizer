name: CI

on:
  push:
    branches: [main, master, develop]
  # No branch filter: stacked PRs target feature branches and must run CI too
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start single-service app
        working-directory: backend
        env:
          PORT: 3020
          SERVE_STATIC_DIR: ${{ github.workspace }}/frontend/dist
          FRONTEND_ORIGIN: http://localhost:3020
        run: |
          node dist/server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3020/api/health > /dev/null && break
            sleep 1
          done
      - name: Run E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3020
        run: npx playwright test
      - name: Upload scene screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-scene
          path: |
            frontend/e2e-scene.png
            frontend/e2e-cab.png
          if-no-files-found: ignore
