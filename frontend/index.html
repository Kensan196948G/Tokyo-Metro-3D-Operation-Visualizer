<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>東京メトロ 3D運行可視化</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d1117; color: #e6edf3; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; overflow: hidden; }
      #app { width: 100vw; height: 100vh; position: relative; }
      #canvas-container { position: absolute; inset: 0; }
      #header {
        position: absolute; top: 0; left: 0; right: 0; z-index: 10;
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(13,17,23,0.85); padding: 8px 16px; backdrop-filter: blur(4px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      #header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; }
      #header-status { display: flex; gap: 16px; font-size: 12px; color: #8b949e; }
      #left-panel {
        position: absolute; top: 48px; left: 0; bottom: 0; z-index: 10;
        width: 200px; background: rgba(13,17,23,0.85); padding: 12px;
        border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto;
        backdrop-filter: blur(4px);
      }
      #left-panel h2 { font-size: 12px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; }
      .route-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; cursor: pointer; padding: 4px; border-radius: 4px; }
      .route-item:hover { background: rgba(255,255,255,0.05); }
      .route-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .route-name { font-size: 12px; }
      .route-check { margin-left: auto; width: 14px; height: 14px; }
      #right-panel {
        position: absolute; top: 48px; right: 0; z-index: 10;
        width: 240px; background: rgba(13,17,23,0.85); padding: 12px;
        border-left: 1px solid rgba(255,255,255,0.1); max-height: calc(100vh - 48px);
        overflow-y: auto; backdrop-filter: blur(4px);
      }
      #right-panel h2 { font-size: 12px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; }
      .alert-item { padding: 6px 8px; margin: 4px 0; border-radius: 4px; font-size: 12px; }
      .alert-info { background: rgba(56,139,253,0.15); border-left: 3px solid #388bfd; }
      .alert-warning { background: rgba(210,153,34,0.15); border-left: 3px solid #d29922; }
      .alert-critical { background: rgba(248,81,73,0.15); border-left: 3px solid #f85149; }
      #footer {
        position: absolute; bottom: 0; left: 200px; right: 240px; z-index: 10;
        background: rgba(13,17,23,0.85); padding: 6px 12px; font-size: 10px;
        color: #8b949e; border-top: 1px solid rgba(255,255,255,0.1);
        display: flex; gap: 16px; align-items: center; backdrop-filter: blur(4px);
      }
      #info-popup {
        position: absolute; z-index: 20; background: rgba(22,27,34,0.95);
        border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
        padding: 12px; font-size: 12px; max-width: 200px; display: none;
        pointer-events: none;
      }
      #info-popup h3 { font-size: 13px; color: #e6edf3; margin-bottom: 4px; }
      #info-popup p { color: #8b949e; margin: 2px 0; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
      .status-ok { background: #3fb950; }
      .status-warn { background: #d29922; }
      .status-err { background: #f85149; }
      .train-item { padding: 4px 0; font-size: 11px; color: #8b949e; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div id="header">
        <h1>🚇 東京メトロ 3D運行可視化</h1>
        <div id="header-status">
          <span><span class="status-dot status-ok"></span>API: <span id="api-status">接続中...</span></span>
          <span>最終更新: <span id="last-update">-</span></span>
        </div>
      </div>
      <div id="left-panel">
        <h2>路線</h2>
        <div id="route-list"></div>
      </div>
      <div id="right-panel">
        <h2>運行情報</h2>
        <div id="alert-list"></div>
        <h2 style="margin-top:12px;">列車</h2>
        <div id="train-list"></div>
      </div>
      <div id="footer">
        <span>出典: 公共交通オープンデータ(ODPT) / 東京地下鉄株式会社</span>
        <span>⚠️ 本アプリは非公式の可視化PoCです。運行情報の正確性を保証しません。</span>
      </div>
      <div id="info-popup"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
